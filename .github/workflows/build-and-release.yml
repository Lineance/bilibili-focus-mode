name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-extension:
    runs-on: ubuntu-latest
    name: Build Extension
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: npm test
      
    - name: Build extension
      run: npm run build
      
    - name: Zip dist folder
      run: |
        cd dist
        zip -r ../bilibili-focus-mode-${{ github.ref_name }}.zip .
        cd ..
      
    - name: Upload extension artifact
      uses: actions/upload-artifact@v4
      with:
        name: extension-zip
        path: bilibili-focus-mode-*.zip

  build-rust:
    name: Build Rust Tool
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc
        
    - name: Build Rust binary (Release)
      working-directory: chromium-extension-monitor
      run: cargo build --release --target x86_64-pc-windows-msvc
      
    - name: Prepare binary
      shell: bash
      run: cp chromium-extension-monitor/target/x86_64-pc-windows-msvc/release/chromium-extension-monitor.exe chromium-extension-monitor-windows.exe
        
    - name: Upload Rust artifact
      uses: actions/upload-artifact@v4
      with:
        name: chromium-extension-monitor-windows.exe
        path: chromium-extension-monitor-windows.exe

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-extension, build-rust]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: List artifacts
      run: ls -la
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          extension-zip/*.zip
          chromium-extension-monitor-windows.exe/chromium-extension-monitor-windows.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}